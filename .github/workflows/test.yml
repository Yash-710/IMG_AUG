name: Website Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check index.html exists
        run: test -f index.html

      - name: Check title exists
        run: grep -q "<title>" rain.html

      - name: TESTING_DEPLOY_HOOK
        run: curl -X POST "${{ secrets.TESTING_DEPLOY_HOOK }}"